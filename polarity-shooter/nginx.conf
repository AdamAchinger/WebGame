server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;
    charset      utf-8;

    types {
        text/html                   html htm;
        text/css                    css;
        application/javascript      js mjs;
        application/json            json;
        image/png                   png;
        image/webp                  webp;
        image/svg+xml               svg;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
